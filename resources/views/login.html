{% extends "base.html" %}
{% block title %}Login Admin - StokMonitor{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4 col-sm-6 fade-up">
        <div class="glass-card p-4 text-center">
            <div style="width:60px;height:60px;margin:0 auto 1.5rem;background:var(--accent-glow);border-radius:18px;display:flex;align-items:center;justify-content:center">
                <i class="fas fa-user-shield" style="font-size:1.5rem;color:var(--accent-light)"></i>
            </div>
            
            <h4 style="font-weight:800;letter-spacing:-0.03em;margin-bottom:0.5rem">Admin Login</h4>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:2rem">Masuk untuk mengelola server mssql</p>

            {% if error %}
            <div class="alert alert-glass alert-danger py-2 px-3 mb-4 text-start" style="font-size: 0.8rem;">
                <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/auth/login" method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-accent w-100 py-2 mb-2" style="font-weight: 700;">
                    Login Sekarang <i class="fas fa-sign-in-alt ms-1"></i>
                </button>
                
                <a href="/stok/index" class="btn btn-glass w-100 py-2" style="font-size: 0.85rem;">
                    <i class="fas fa-arrow-left me-1"></i> Kembali ke Beranda
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
